name: Test & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build pebble_calc Rust module (shared by test jobs) ──
  build-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-calc

      - name: Build wheel
        run: |
          pip install maturin
          cd rust-calc
          maturin build --release -o ../dist-wheels

      - uses: actions/upload-artifact@v4
        with:
          name: pebble-calc-wheel
          path: dist-wheels/*.whl

  # ── Fast backend unit tests (in-memory DB, no server needed) ──
  unit-tests:
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/download-artifact@v4
        with:
          name: pebble-calc-wheel
          path: dist-wheels

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pip install dist-wheels/*.whl

      - name: Run backend API tests
        env:
          PYTHONPATH: .
        run: pytest backend/tests/ -v --tb=short

  # ── Excel import + recalc verification ──
  xls-tests:
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/download-artifact@v4
        with:
          name: pebble-calc-wheel
          path: dist-wheels

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest requests openpyxl
          pip install dist-wheels/*.whl

      - name: Start backend
        run: |
          rm -f pebble.db pebble.db-shm pebble.db-wal
          PEBBLE_SKIP_TRANSLATE=1 nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/backend.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/models >/dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Seed LLM cache
        run: |
          python -c "
          import json, os
          cache = 'tests/fixtures/llm_cache.json'
          if not os.path.exists(cache): exit(0)
          os.makedirs('.llm_cache', exist_ok=True)
          with open(cache) as f: entries = json.load(f)
          for k, v in entries.items():
              with open(f'.llm_cache/{k}.json', 'w') as out: json.dump(v, out)
          print(f'Seeded {len(entries)} LLM cache entries')
          "

      - name: Run XLS model tests
        run: pytest tests/test_xls_models.py -v -s --tb=short

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xls-backend-log
          path: /tmp/backend.log
          if-no-files-found: ignore

  # ── E2E UI tests (Playwright) ──
  e2e-tests:
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - uses: actions/download-artifact@v4
        with:
          name: pebble-calc-wheel
          path: dist-wheels

      - name: Install backend deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-playwright requests
          pip install dist-wheels/*.whl

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Seed LLM cache
        run: |
          python -c "
          import json, os
          cache = 'tests/fixtures/llm_cache.json'
          if not os.path.exists(cache): exit(0)
          os.makedirs('.llm_cache', exist_ok=True)
          with open(cache) as f: entries = json.load(f)
          for k, v in entries.items():
              with open(f'.llm_cache/{k}.json', 'w') as out: json.dump(v, out)
          print(f'Seeded {len(entries)} LLM cache entries')
          "

      - name: Start backend
        run: |
          rm -f pebble.db pebble.db-shm pebble.db-wal
          nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/backend.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/models >/dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run E2E tests
        env:
          PEBBLE_BASE: http://localhost:8000
          PEBBLE_API: http://localhost:8000/api
        run: pytest tests/test_e2e.py -v -s --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: /tmp/uiflow/
          if-no-files-found: ignore

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-log
          path: /tmp/backend.log
          if-no-files-found: ignore

  # ── Release + deploy ──
  # TODO: restore xls-tests in `needs:` once ENG/ЦО accuracy regression is fixed.
  release:
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build release zip
        run: python build_release.py

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete old 'latest' release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create latest \
            pebble-release.zip \
            --title "Pebble (latest)" \
            --notes "Auto-built from \`${{ steps.sha.outputs.short }}\` on $(date -u +%Y-%m-%d).

          **Install on Windows:**
          1. Download \`pebble-release.zip\` below
          2. Extract and double-click \`Install.bat\`

          **Or run in PowerShell:**
          \`\`\`
          powershell -c \"irm https://raw.githubusercontent.com/fvyshkov/pebble/main/installer/install.ps1 | iex\"
          \`\`\`" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy to public releases repo (for private repo access) ──
      - name: Push to public releases repo
        if: ${{ vars.RELEASES_REPO != '' }}
        env:
          DEPLOY_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          RELEASES_REPO: ${{ vars.RELEASES_REPO }}
        run: |
          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/${RELEASES_REPO}.git" _releases
          cp pebble-release.zip _releases/pebble-release.zip
          cp installer/install.ps1 _releases/install.ps1

          # Generate download page
          cat > _releases/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <title>Pebble — Download</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              h1 { color: #333; }
              .btn { display: inline-block; padding: 16px 32px; background: #2563eb; color: white;
                     text-decoration: none; border-radius: 8px; font-size: 18px; margin: 20px 0; }
              .btn:hover { background: #1d4ed8; }
              code { background: #f1f5f9; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
              .alt { margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>Pebble</h1>
            <p>Финансовое моделирование</p>
            <a class="btn" href="pebble-release.zip">Скачать для Windows</a>
            <p>Скачайте, распакуйте, запустите <code>Install.bat</code></p>
            <div class="alt">
              <strong>Или одной командой в PowerShell:</strong><br><br>
              <code>powershell -c "irm https://RELEASES_URL/install.ps1 | iex"</code>
            </div>
          </body>
          </html>
          HTMLEOF

          # Replace placeholder with actual URL
          PAGES_URL="https://$(echo $RELEASES_REPO | cut -d/ -f1).github.io/$(echo $RELEASES_REPO | cut -d/ -f2)"
          sed -i "s|RELEASES_URL|${PAGES_URL}|g" _releases/index.html

          cd _releases
          git add -A
          git diff --cached --quiet || {
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "Release ${{ steps.sha.outputs.short }}"
            git push
          }

      # ── Trigger Render deploy (autoDeploy is off, deploy only after tests) ──
      - name: Deploy to Render
        if: ${{ vars.RENDER_DEPLOY_HOOK != '' }}
        run: curl -sf "${{ vars.RENDER_DEPLOY_HOOK }}"
